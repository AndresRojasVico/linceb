[PHP]
; Tamaño máximo de subida (para archivos .atom)
post_max_size = 20M
upload_max_filesize = 20M

; Tiempo de ejecución
max_execution_time = 300
max_input_time = 300

; Memoria
memory_limit = 256M

; Producción
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Timezone
date.timezone = Europe/Madrid
